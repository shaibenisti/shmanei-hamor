name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deployment; let an in-flight run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------
  # Build: produces exactly ONE "github-pages" artifact from ./out
  # ----------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          # Project site is served from /shmanei-hamor/
          NEXT_PUBLIC_BASE_PATH: /shmanei-hamor
        run: npm run build

      # The ONLY artifact upload in this workflow.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # ----------------------------------------------------------------------
  # Deploy: consumes the single artifact above. The ONLY deploy step.
  # ----------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
